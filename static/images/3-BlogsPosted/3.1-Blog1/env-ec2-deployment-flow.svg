<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Environment variables deployment flow on AWS EC2</title>
  <desc id="desc">Diagram showing local Windows source code and .env file deployed to EC2 Ubuntu, where case-sensitive Boolean values can break logic, then improved by using lowercase values and AWS Parameter Store or Secrets Manager.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#3b6ea8"/>
    </marker>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#18324a}
      .label{font:700 18px Arial,sans-serif;fill:#102033}
      .text{font:15px Arial,sans-serif;fill:#26384a}
      .small{font:13px Arial,sans-serif;fill:#4c5f73}
      .box{fill:#f6fbff;stroke:#7aa7d9;stroke-width:2;rx:12}
      .warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2;rx:12}
      .good{fill:#f0fdf4;stroke:#22c55e;stroke-width:2;rx:12}
      .aws{fill:#fff;stroke:#ff9900;stroke-width:2;rx:12}
      .arrow{stroke:#3b6ea8;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="520" fill="#ffffff"/>
  <text x="44" y="54" class="title">Deploy Backend on AWS EC2: .env Case-Sensitive Issue</text>

  <rect x="48" y="110" width="210" height="120" class="box"/>
  <text x="72" y="146" class="label">Windows Local</text>
  <text x="72" y="176" class="text">Source code runs well</text>
  <text x="72" y="202" class="small">ENVIRONMENT_AUTO=True</text>

  <rect x="332" y="110" width="210" height="120" class="aws"/>
  <text x="356" y="146" class="label">SSH Deploy</text>
  <text x="356" y="176" class="text">Copy source code</text>
  <text x="356" y="202" class="text">Create .env manually</text>

  <rect x="616" y="110" width="210" height="120" class="warn"/>
  <text x="640" y="146" class="label">EC2 Ubuntu/Linux</text>
  <text x="640" y="176" class="text">Case-sensitive runtime</text>
  <text x="640" y="202" class="small">"True" is not "true"</text>

  <rect x="900" y="110" width="210" height="120" class="warn"/>
  <text x="924" y="146" class="label">Bug Appears</text>
  <text x="924" y="176" class="text">Boolean condition fails</text>
  <text x="924" y="202" class="text">App logic behaves wrong</text>

  <path d="M258 170 H322" class="arrow"/>
  <path d="M542 170 H606" class="arrow"/>
  <path d="M826 170 H890" class="arrow"/>

  <rect x="190" y="320" width="250" height="120" class="good"/>
  <text x="214" y="356" class="label">Quick Fix</text>
  <text x="214" y="386" class="text">Use lowercase values</text>
  <text x="214" y="412" class="small">ENVIRONMENT_AUTO=true</text>

  <rect x="506" y="320" width="250" height="120" class="good"/>
  <text x="530" y="356" class="label">Normalize in Code</text>
  <text x="530" y="386" class="text">toLowerCase()</text>
  <text x="530" y="412" class="text">Explicit Boolean parsing</text>

  <rect x="822" y="320" width="250" height="120" class="aws"/>
  <text x="846" y="356" class="label">AWS Best Practice</text>
  <text x="846" y="386" class="text">Parameter Store</text>
  <text x="846" y="412" class="text">Secrets Manager + IAM Role</text>

  <path d="M1005 240 C1005 282 950 292 950 314" class="dash"/>
  <path d="M440 380 H496" class="arrow"/>
  <path d="M756 380 H812" class="arrow"/>
</svg>
